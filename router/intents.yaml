# 学习工作流意图路由表
# 约定：
# - intent: 稳定的路由键
# - purpose: 该意图解决什么问题
# - inputs: 进入该意图前建议准备的上下文
# - outputs: 默认写入位置或产物类型
# - forbidden_outputs: 明确禁止写入的位置
# - skill_path: 优先匹配的 skill 文件

version: 1
default_language: zh-CN

intents:
  generate_day:
    purpose: 根据固定大纲、动态大纲、当前上下文和资料来源生成今天的 day 学习任务
    inputs:
      - source/
      - tmp/pdfs/
      - plan/outline.json
      - state/dynamic-outline.json
      - state/weak-points.json
      - state/current-context.json
      - state/learning-progress.json
    outputs:
      primary: plan/days/<day-id>.md
      secondary:
        - study/<day-id>/lesson.md
        - study/<day-id>/practice.py
        - study/<day-id>/answers.md
        - study/<day-id>/mistakes.md
        - study/<day-id>/day.json
        - state/current-context.json
    forbidden_outputs:
      - study/units/**
    skill_path: skills/intents/generate_day.md
    template_path: skills/templates/day-plan-template.md

  review_day:
    purpose: 根据一天学习结果更新动态大纲、薄弱点和下一次 focus
    inputs:
      - state/dynamic-outline.json
      - state/weak-points.json
      - state/current-context.json
      - plan/days/<day-id>.md
      - study/<day-id>/notes.md
      - study/<day-id>/mistakes.md
    outputs:
      primary: state/dynamic-outline.json
      secondary:
        - state/weak-points.json
        - state/current-context.json
        - plan/current-outline.md
    forbidden_outputs:
      - study/units/**
    skill_path: skills/intents/review_day.md
    template_path: skills/templates/week-summary-template.md

  explain_api:
    purpose: 解释指定 Python API 的参数、返回值、真实用法与常见误区
    inputs:
      - source/
      - tmp/pdfs/
      - plan/outline.json
      - state/current-context.json
      - 用户提到的 API 名称
    outputs:
      primary: study/<day-id>/lesson.md
      secondary:
        - study/<day-id>/notes.md
        - state/weak-points.json
    forbidden_outputs:
      - study/units/**
    skill_path: skills/intents/explain_api.md
    template_path: skills/templates/api-explanation-template.md

  summarize_week:
    purpose: 汇总一周学习成果，并生成下一周的最小推进建议
    inputs:
      - plan/days/
      - study/
      - source/
      - tmp/pdfs/
      - state/dynamic-outline.json
      - state/learning-progress.json
      - state/weak-points.json
      - state/current-context.json
    outputs:
      primary: plan/weekly-summary.md
      secondary:
        - plan/days/
        - state/current-context.json
        - state/dynamic-outline.json
        - state/learning-progress.json
    forbidden_outputs:
      - study/units/**
    skill_path: skills/intents/summarize_week.md
    template_path: skills/templates/week-summary-template.md
